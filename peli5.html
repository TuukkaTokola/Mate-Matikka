<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peli 5 | Matematikka</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/peli5.css">
</head>

<body>

<header class="site-header">
  <div class="container header-content">
    <a href="index.html" class="logo">
      <img src="images/logo.png">
      <span class="logo-text">Matematikka</span>
    </a>

    <nav class="main-nav">
      <a href="index.html">Etusivu</a>
      <a href="pelit.html" class="active">Pelit</a>
      <a href="scores.html">Pisteet</a>
      <a href="info.html">Infosivu</a>
    </nav>
  </div>
</header>

<main class="game-container">

  <div class="game-title">
    Kertotaulu-ampuja
  </div>

  <div class="game-subtitle">

  </div>

  <div id="question" class="question">
    2 × 3 = ?
  </div>

  <div class="targets">

    <button class="answer target-answer" id="a1"></button>
    <button class="answer target-answer" id="a2"></button>
    <button class="answer target-answer" id="a3"></button>
    <button class="answer target-answer" id="a4"></button>

  </div>

  <div id="feedback" class="feedback"></div>

  <div id="game-message" class="game-message hidden">
  <h2 id="message-title">Aika loppui!</h2>
  <p id="message-text">Haluatko yrittää uudelleen?</p>

  <div class="message-buttons">
    <button id="retry-btn">Kokeile uudelleen</button>
    <a href="pelit.html">Pelivalikko</a>
    <a href="scores.html">Pistesivu</a>
  </div>
</div>

 <div class="time-box">
  <h2>AIKAA</h2>
  <p><span id="time">60</span>s</p>
</div>

<div class="score-box">
  <h2>PISTEET</h2>
  <p><span id="score">0</span>/10</p>
</div>

<div class="streak-box">
  <h2>PUTKI🔥</h2>
  <p><span id="streak">0</span></p>
</div>


</main>

<script src="js/scores.js"></script>
<script src="js/peli5.js"></script>

</body>
</html>
