<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peli 5 | Matematikka</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/peli5.css">
</head>

<body>

<header class="site-header">
  <div class="container header-content">
    <a href="index.html" class="logo">
      <img src="images/logo.png">
      <span class="logo-text">Matematikka</span>
    </a>

    <nav class="main-nav">
      <a href="index.html">Etusivu</a>
      <a href="pelit.html" class="active">Pelit</a>
      <a href="scores.html">Pisteet</a>
      <a href="info.html">Infosivu</a>
    </nav>
  </div>
</header>

<main class="game-container">

  <!-- 🎯 Pelin otsikko -->
  <div class="game-title">
    Kertotaulu-ampuja
  </div>

  <div class="game-subtitle">
    Ammu oikea vastaus!
  </div>

  <!-- 🧠 Kysymys -->
  <div id="question" class="question">
    2 × 3 = ?
  </div>

  <!-- 🎯 Vastaukset (taulujen kohdalle) -->
  <div class="targets">

    <button class="target-answer" id="a1"></button>
    <button class="target-answer" id="a2"></button>
    <button class="target-answer" id="a3"></button>
    <button class="target-answer" id="a4"></button>

  </div>

  <!-- 💬 Palaute -->
  <div id="feedback" class="feedback"></div>

  <!-- ⭐ Pisteet -->
  <div class="score">
    Pisteet: <span id="score">0</span>/10
  </div>

</main>

<script src="js/scores.js"></script>
<script src="js/peli5.js"></script>

</body>
</html>
