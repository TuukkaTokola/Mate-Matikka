<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peli 4</title>
  <link rel="stylesheet" href="css/peli4.css" />
</head>
<body>
  <div class="page">
    <header class="top-banner">
      <h1>Järjestä numerot!</h1>
    </header>

    <main class="game-board">
      <div class="instruction-box">
        <h2>Järjestä luvut pienimmästä suurimpaan!</h2>
      </div>

      <button id="back-button" class="back-button">
          ⬅ Takaisin etusivulle
      </button>

      <section class="cards">
        <button class="number-card">3</button>
        <button class="number-card">8</button>
        <button class="number-card">12</button>
        <button class="number-card">3+6</button>
        <button class="number-card">17</button>
        <button class="number-card">65</button>
      </section>

      <section class="answer-row">
        <div class="answer-slot"></div>
        <div class="arrow">➜</div>
        <div class="answer-slot"></div>
        <div class="arrow">➜</div>
        <div class="answer-slot"></div>
        <div class="arrow">➜</div>
        <div class="answer-slot"></div>
        <div class="arrow">➜</div>
        <div class="answer-slot"></div>
        <div class="arrow">➜</div>
        <div class="answer-slot"></div>
      </section>

      <div class="check-button-wrap">
        <button class="check-button">Tarkista</button>
      </div>
      <div id="feedback-box" class="content-card" style="display:none; text-align:center;">
        <h2>Tuloksesi</h2>
        <p id="feedback-score"></p>
        <div id="feedback-emoji" style="font-size:2rem;"></div>
        </div>
    </main>
  

  <script src="js/scores.js"></script>
  <script src="js/peli4.js"></script>
</body>
</html>
